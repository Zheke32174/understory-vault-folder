name: Apply coordinated signing containment

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'security/public-signing-containment-v1'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: security/public-signing-containment-v1
          fetch-depth: 0
      - name: Import exact repaired shared trust boundary
        run: |
          set -euo pipefail
          root='https://raw.githubusercontent.com/Zheke32174/understory-common/b0ec1004a5e6b2ece27bea11c3903004002b4c11'
          for path in SuitePins.kt Tamper.kt SuiteAttestation.kt SuiteCapabilityRegistry.kt; do
            curl -fsSL "$root/common-security/src/main/java/com/understory/security/$path" -o "common-security/src/main/java/com/understory/security/$path"
          done
          curl -fsSL "$root/tools/apply-app-public-signing-containment.py" -o /tmp/apply-containment.py
      - name: Apply repository containment
        env:
          BASE_HEAD: 0b9cb9f1795b8d36b1c54bcb90bfd8736df4694a
        run: python /tmp/apply-containment.py
      - name: Verify bounded result
        run: |
          set -euo pipefail
          python ci/validate-public-signing-boundary.py
          gradle --version
          git diff --check
      - name: Commit repaired branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Contain public debug signing identity"
          git push origin HEAD:security/public-signing-containment-v1
